name: Auto Generate Articles

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install openai

      - name: Generate articles with AI
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          git config user.name "pengjiangwen"
          git config user.email "pengjiangwen@gmail.com"
          python scripts/generate_article.py

      - uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'

      - name: Install Hugo theme
        run: |
          rm -rf themes/PaperMod
          git clone https://github.com/adityatelange/hugo-PaperMod.git themes/PaperMod --depth=1

      - run: hugo --minify --destination public

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
